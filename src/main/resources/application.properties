spring.application.name=tinycorp-laptop-tracker

spring.datasource.url=jdbc:h2:mem:laptoptracker;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=always

app.jwt.secret=TinyCorpLaptopTrackerSecretKeyForJwtSigningMustBeLongEnough12345
app.jwt.expiration-ms=3600000

logging.file.name=logs/laptop-tracker.log
logging.level.com.tinycorp.laptoptracker=INFO
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
