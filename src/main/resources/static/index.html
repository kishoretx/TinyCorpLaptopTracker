<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TinyCorp Tracker UI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div>
        <h2 style="margin:0;">TinyCorp Laptop Tracker</h2>
        <div style="color:#6b7280;">Login and navigate to Employees, Devices, and Assignments pages.</div>
      </div>
      <div class="nav">
        <a href="/index.html" class="active">Home</a>
        <a href="/employees.html">Employees</a>
        <a href="/devices.html">Devices</a>
        <a href="/assignments.html">Assignments</a>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Base URL</label>
        <input id="baseUrl" />
      </div>
      <div class="field">
        <label>Username</label>
        <input id="username" value="manager" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" value="manager123" />
      </div>
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="managerBtn">Use Manager</button>
      <button id="employeeBtn">Use Employee</button>
      <button id="loginBtn" class="primary">Login</button>
      <button id="logoutBtn" class="danger">Logout</button>
    </div>

    <div id="status" class="status"></div>
    <pre id="result">No response yet.</pre>
  </div>
</div>

<script src="/app.js"></script>
<script>
  const baseUrlEl = document.getElementById("baseUrl");
  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("password");
  baseUrlEl.value = App.getBaseUrl();

  async function login() {
    try {
      App.setBaseUrl(baseUrlEl.value.trim());
      const payload = await App.request("/api/v1/auth/login", "POST", {
        username: usernameEl.value.trim(),
        password: passwordEl.value
      }, false);
      App.setToken(payload.token);
      App.showJson("result", payload);
      App.setStatus("status", "Login successful. Token saved in local storage.", false);
    } catch (e) {
      App.setStatus("status", e.message, true);
    }
  }

  document.getElementById("managerBtn").onclick = () => {
    usernameEl.value = "manager";
    passwordEl.value = "manager123";
  };
  document.getElementById("employeeBtn").onclick = () => {
    usernameEl.value = "employee";
    passwordEl.value = "employee123";
  };
  document.getElementById("loginBtn").onclick = login;
  document.getElementById("logoutBtn").onclick = () => {
    App.clearToken();
    App.setStatus("status", "Token removed.", false);
    App.showJson("result", { token: "" });
  };
</script>
</body>
</html>
